name: Version

# Releases every merge to main with a standard three-part SemVer tag.
#
# On each push to main this reads the requested release line from the package.json
# `version` field, which must be plain `<major>.<minor>.<build>`, then creates the
# next `v<major>.<minor>.<build>` tag and GitHub Release for the merge commit.
#
# Build-number rules:
#   - existing tags in the same major/minor line are scanned as `v<major>.<minor>.<build>`;
#   - if no tag exists for that line, the package.json build value is used as-is, so
#     bumping major/minor to `x.y.0` releases `v<x>.<y>.0`;
#   - if tags already exist, the next build is one greater than the highest existing
#     build, unless package.json requests a higher build floor.
#
# Why a tag/release instead of committing a bump back to main:
#   - it works identically on protected branches (no bypass actor or bump commit needed);
#   - it never re-triggers CI or needs [skip ci] loops;
#   - the repository keeps standard SemVer tags such as `v1.2.0`, `v1.2.1`, `v1.2.2`.
#
# To see which release a checkout corresponds to: git describe --tags

on:
  push:
    branches: [main]

permissions:
  contents: write # required to push tags and create releases

# Serialize runs so two closely-spaced merges cannot compute the same build number.
concurrency:
  group: version-main
  cancel-in-progress: false

jobs:
  release:
    name: Tag and release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history + tags, needed to compute the next build number

      - name: Compute next version, push tag, and create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(jq -r .version package.json)
          if [[ ! "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::package.json version '$version' must be plain <major>.<minor>.<build> SemVer."
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          requested_build="${BASH_REMATCH[3]}"
          release_line="${major}.${minor}"

          last_build=$(
            git tag --list "v${release_line}.*" \
              | sed -E "s/^v${major}\.${minor}\.//" \
              | grep -E '^[0-9]+$' \
              | sort -n \
              | tail -1 \
              || true
          )

          if [[ -z "$last_build" ]]; then
            build="$requested_build"
          else
            next_build=$((last_build + 1))
            if (( requested_build > next_build )); then
              build="$requested_build"
            else
              build="$next_build"
            fi
          fi

          tag="v${release_line}.${build}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "::error::Computed tag '$tag' already exists."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release ${tag}"
          git push origin "refs/tags/${tag}"

          gh release create "$tag" \
            --verify-tag \
            --title "$tag" \
            --notes "Automated release for ${tag} from ${GITHUB_SHA}."

          {
            echo "### Release created: \`${tag}\`"
            echo ""
            echo "- Package version: \`${version}\`"
            echo "- Release line: \`${release_line}\`"
            echo "- Build number: \`${build}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"
