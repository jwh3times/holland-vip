name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Verify Codex artifacts are in sync
        run: node scripts/sync-agents.mjs --check

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: static-site
          path: out/
          retention-days: 7

  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Test the exact artifact the build job produced; the webServer in
      # playwright.config.ts serves it via `npx serve out` when CI is set.
      - name: Download static build
        uses: actions/download-artifact@v8
        with:
          name: static-site
          path: out

      # Both projects run on the Chromium engine (Mobile Chrome = Pixel 5),
      # so a single chromium install covers desktop + mobile viewports.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e -- --project=chromium --project="Mobile Chrome"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  unit:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Fails the job if coverage drops below the 80% thresholds in vitest.config.ts.
      - name: Run unit tests with coverage
        run: npm run test:unit:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  changelog:
    name: Changelog Version
    runs-on: ubuntu-latest
    # PR-only: on push to main, version.yml mints the tag and next-version would advance
    # past the changelog's top entry, so the guard must not run there. Dependabot PRs don't
    # touch the changelog; version.yml still tags them, so exempt the bot.
    # Key off the PR author, not github.actor: actor is whoever triggered THIS run, so a
    # human pushing a fixup to a Dependabot branch would re-arm the guard on `synchronize`.
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full tags, needed to compute the next build number

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"

      - name: Verify CHANGELOG top version matches the version this merge will mint
        run: |
          expected=$(node scripts/next-version.mjs)
          top=$(grep -m1 -E '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md \
            | sed -E 's/^## \[([0-9.]+)\].*/\1/')
          echo "Expected (next-version): $expected"
          echo "CHANGELOG top released:  $top"
          if [ "$expected" != "$top" ]; then
            echo "::error::CHANGELOG top version '$top' does not match the version this merge will mint ('$expected'). Run /ship to update CHANGELOG.md, or, with no local checkout, add a '## [$expected] - $(date -u +%F)' section above '## [$top]' by hand."
            exit 1
          fi
