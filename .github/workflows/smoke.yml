name: Smoke Test (production)

# CI in this repo is a pre-deploy gate; Cloudflare Pages builds/deploys from the
# repo directly, so nothing here verifies the *live* site. This job hits the
# deployed URL to catch outages or regressions after they ship.
on:
  schedule:
    # Daily at 07:23 UTC (off the hour to dodge cron congestion). Scheduled runs
    # execute on the default branch.
    - cron: "23 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Production smoke check
    runs-on: ubuntu-latest
    # holland.vip is behind Cloudflare, which blocks datacenter/bot traffic with a
    # 403 (GitHub-hosted runners live on Azure IPs). Each curl sends a secret header
    # that a Cloudflare WAF custom rule allowlists (Skip), so this check — and only
    # this check — can reach the live site. Set SMOKE_TOKEN in the repo secrets and a
    # matching "skip when http.request.headers[\"x-smoke-check\"] eq <token>" WAF rule.
    env:
      SMOKE_TOKEN: ${{ secrets.SMOKE_TOKEN }}
    steps:
      - name: Homepage responds and renders expected content
        run: |
          set -euo pipefail
          url="https://holland.vip/"

          if [ -z "$SMOKE_TOKEN" ]; then
            echo "::warning::SMOKE_TOKEN secret is empty — Cloudflare will 403 this datacenter request. Add the secret and matching WAF skip rule."
          fi

          echo "GET $url"
          status=$(curl -sS -L --retry 3 --retry-delay 5 \
            -H "X-Smoke-Check: $SMOKE_TOKEN" \
            -o body.html -w '%{http_code}' "$url")
          echo "HTTP $status"
          if [ "$status" != "200" ]; then
            echo "::error::Expected HTTP 200 from $url, got $status (a 403 usually means the Cloudflare WAF bypass header/rule is missing or out of sync with SMOKE_TOKEN)"
            exit 1
          fi

          if ! grep -q "Jerry Holland" body.html; then
            echo "::error::Homepage did not contain expected content 'Jerry Holland'"
            exit 1
          fi
          echo "Homepage status + content OK"

      - name: Security headers are present
        run: |
          set -euo pipefail
          url="https://holland.vip/"
          headers=$(curl -sS -L -H "X-Smoke-Check: $SMOKE_TOKEN" -D - -o /dev/null "$url" | tr -d '\r')
          echo "$headers"

          require_header() {
            if ! printf '%s\n' "$headers" | grep -iq "^$1:"; then
              echo "::error::Missing expected response header: $1"
              exit 1
            fi
          }
          require_header "content-security-policy"
          require_header "strict-transport-security"
          require_header "x-content-type-options"
          require_header "x-frame-options"
          echo "Security headers OK"
