version: 2

updates:
  # JavaScript/TypeScript dependencies (package.json + package-lock.json)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      # NOTE: Dependabot's "daily" interval runs on weekdays (Mon-Fri) only.
      # The time/timezone below pin the run to 07:00 America/New_York (ET),
      # which tracks EST/EDT automatically.
      interval: "daily"
      time: "07:00"
      timezone: "America/New_York"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      # Bundle low-risk minor + patch bumps into one PR; majors stay separate.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions pinned in .github/workflows/*
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "07:00"
      timezone: "America/New_York"
    commit-message:
      prefix: "ci"
    groups:
      actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
