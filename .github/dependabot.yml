# Dependabot version updates
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Note: Dependabot's "daily" interval runs on weekdays (Mon-Fri).
# Times are in the given IANA timezone; America/New_York tracks ET (EST/EDT).
#
# Minor/patch updates are grouped into a single PR per ecosystem to reduce noise;
# MAJOR bumps arrive individually — EXCEPT for peer-locked families where a lone
# bump would leave an unsatisfiable peer range. Those families travel together as
# one major PR.
version: 2
updates:
  # JavaScript/TypeScript dependencies (package.json + package-lock.json)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "05:00"
      timezone: "America/New_York"
    commit-message:
      prefix: "chore"
      include: "scope"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    groups:
      # --- Peer-locked families — majors only. All minor/patch bumps land in the
      #     catch-all group at the bottom. ---

      # next and @next/eslint-plugin-next ship in lockstep — the plugin's major
      # tracks the Next.js major it supports.
      next-ecosystem:
        patterns:
          - "next"
          - "@next/*"
        update-types:
          - "major"

      # react + react-dom ship at identical versions and must match at runtime;
      # the @types/* packages track the same major.
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - "major"

      # All @radix-ui/* primitives peer-require the same React major.
      radix-ui:
        patterns:
          - "@radix-ui/*"
        update-types:
          - "major"

      # @testing-library/react and user-event both peer-require @testing-library/dom.
      testing-library:
        patterns:
          - "@testing-library/*"
        update-types:
          - "major"

      # @vitejs/plugin-react requires a matching Vite major; vitest and @vitest/*
      # track the Vite majors they support.
      vite-ecosystem:
        patterns:
          - "vite"
          - "vitest"
          - "@vitejs/plugin-react"
          - "@vitest/*"
        update-types:
          - "major"

      # @eslint/js is lockstep-versioned with eslint; plugins peer-cap on the eslint
      # major; typescript-eslint peer-bounds both eslint and typescript.
      lint-and-typescript:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "@eslint-react/*"
          - "eslint-plugin-*"
          - "eslint-config-*"
          - "typescript-eslint"
          - "globals"
          - "typescript"
        update-types:
          - "major"

      # Bundle low-risk minor + patch bumps into one PR; majors stay separate.
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions pinned in .github/workflows/*
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "05:00"
      timezone: "America/New_York"
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
